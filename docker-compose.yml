services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
        mc mb --ignore-existing local/nexus-blobstore;
      "

  nexus:
    image: sonatype/nexus3:3.93.2
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      INSTALL4J_ADD_VM_PARAMS: >-
        -Xms512m -Xmx1200m
        -Dnexus.assetBlobCleanupTask.blobCreatedDelayMinute=0
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /nexus-data/etc
        echo 'nexus.assetBlobCleanupTask.cronSchedule=0 0 0 31 12 ?' >> /nexus-data/etc/nexus.properties
        exec /opt/sonatype/nexus/bin/nexus run
    volumes:
      - nexus-data:/nexus-data

volumes:
  nexus-data:
  minio-data:
